/*
 * This file was generated by the Gradle 'init' task.
 */
buildscript {
    ext.kotlin_version = '1.8.22'

    repositories {
        mavenCentral()
    }
    dependencies {
        classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlin_version"
        classpath "com.netflix.nebula:gradle-ospackage-plugin:11.10.0"
        classpath 'com.github.johnrengelman:shadow:8.1.1'
    }
}
plugins {
    id 'java'
    id 'maven-publish'
    id 'idea'
    id 'application'
    id "org.jetbrains.kotlin.jvm" version "$kotlin_version"
    id "org.jetbrains.kotlin.kapt" version "$kotlin_version"
}
repositories {
    mavenCentral()
    maven { url "https://oss.sonatype.org/content/repositories/snapshots/" }
}
application {
    mainClass = "com.datastax.dsestatsconverter.ConvertKt"
}

configurations.all {
    resolutionStrategy {
        // Force secure versions of transitive dependencies from cassandra-all
        force 'org.apache.cassandra:cassandra-all:3.11.19'
        force 'org.yaml:snakeyaml:2.4'
        force 'org.lz4:lz4-java:1.8.1'  // Fixes CVE-2025-12183, CVE-2025-66566
        force 'io.netty:netty-all:4.1.129.Final'  // Fixes multiple netty CVEs
        force 'io.netty:netty-codec-http2:4.1.129.Final'
        force 'io.netty:netty-codec-http:4.1.129.Final'
        force 'io.netty:netty-handler:4.1.129.Final'
        force 'io.netty:netty-common:4.1.129.Final'
        force 'io.netty:netty-codec:4.1.129.Final'
        force 'io.netty:netty-codec-smtp:4.1.129.Final'
        force 'ch.qos.logback:logback-core:1.5.15'  // Fixes CVE-2024-12798, CVE-2025-11226, CVE-2026-1225, CVE-2024-12801
        force 'ch.qos.logback:logback-classic:1.5.15'
        force 'com.google.guava:guava:33.3.1-jre'  // Fixes CVE-2023-2976, CVE-2020-8908
        force 'org.apache.thrift:libthrift:0.20.0'  // Fixes CVE-2019-0205, CVE-2018-11798
        force 'org.apache.httpcomponents:httpclient:4.5.14'  // Fixes CVE-2020-13956, CVE-2015-5262, WS-2017-3734
        force 'com.fasterxml.jackson.core:jackson-core:2.15.4'
        force 'com.fasterxml.jackson.core:jackson-databind:2.15.4'
        force 'com.fasterxml.jackson.core:jackson-annotations:2.15.4'
        force 'commons-codec:commons-codec:1.17.2'
        force 'commons-io:commons-io:2.17.0'
        force 'org.apache.commons:commons-lang3:3.18.0'
        
        // Handle lz4-java capability conflict by selecting org.lz4 over at.yawk.lz4
        capabilitiesResolution.withCapability('org.lz4:lz4-java') {
            select('org.lz4:lz4-java:1.8.1')
        }
        // Substitute old version with new
        dependencySubstitution {
            substitute module('org.lz4:lz4-java:1.8.0') using module('org.lz4:lz4-java:1.8.1')
            substitute module('net.jpountz.lz4:lz4:1.3.0') using module('org.lz4:lz4-java:1.8.1')
        }
    }
}

dependencies {
    implementation "org.jetbrains.kotlin:kotlin-stdlib-jdk8:$kotlin_version"
    implementation "org.jetbrains.kotlin:kotlin-reflect:$kotlin_version"
    implementation 'org.slf4j:slf4j-api:1.7.36'
    implementation 'ch.qos.logback:logback-classic:1.5.15'
    implementation 'ch.qos.logback:logback-core:1.5.15'
    implementation 'commons-io:commons-io:2.17.0'
    // These are just to get the DSE SSTableMetadata command working
    // Jar filenames are resolved dynamically from the libs/ directory
    implementation fileTree(dir: 'libs', include: ['dse-db-all-*.jar'])
    implementation fileTree(dir: 'libs', include: ['dse-commons-*.jar'])
    implementation fileTree(dir: 'libs', include: ['durian-*.jar'])
    implementation fileTree(dir: 'libs', include: ['jctools-core-*.jar'])
    implementation fileTree(dir: 'libs', include: ['rxjava-2.*.jar'])
    implementation fileTree(dir: 'libs', include: ['netty-all-*.jar'])
    implementation fileTree(dir: 'libs', include: ['agrona-*.jar'])
    implementation 'joda-time:joda-time:2.13.1'
    implementation "commons-cli:commons-cli:1.9.0"
    implementation 'com.google.guava:guava:33.3.1-jre'
    implementation 'com.clearspring.analytics:stream:2.9.8'
    implementation 'com.github.ben-manes.caffeine:caffeine:2.9.3'
    implementation 'com.github.jbellis:jamm:0.4.0'
    implementation 'com.datastax.oss:java-driver-core:4.17.0'
    // end of DSE SSTableMetadata dependencies
    implementation 'org.apache.cassandra:cassandra-all:3.11.19'
    implementation 'org.lz4:lz4-java:1.8.1'  // Explicitly include to override cassandra-all's transitive dependency
    implementation 'org.apache.commons:commons-lang3:3.18.0'
    implementation 'commons-codec:commons-codec:1.17.2'
    implementation 'commons-io:commons-io:2.17.0'
    testImplementation 'junit:junit:4.13.2'
    testImplementation 'org.jetbrains.kotlin:kotlin-test:1.8.22'
    testImplementation 'org.assertj:assertj-core:3.26.3'
    testImplementation 'io.mockk:mockk:1.9.3.kotlin12'
}

group = 'com.datastax'
version = '0.1'

sourceCompatibility = '11'
targetCompatibility = '11'
// Java 11 is required

publishing {
    publications {
        maven(MavenPublication) {
            from(components.java)
        }
    }
}
compileKotlin {
    kotlinOptions.jvmTarget = "11"
    kotlinOptions.freeCompilerArgs = ["-Xallow-result-return-type"]
}
compileTestKotlin {
    kotlinOptions.jvmTarget = "11"
    kotlinOptions.freeCompilerArgs = ["-Xallow-result-return-type"]
}
kapt {
    // Correct issue when a module named 'system' exists in project.
    // Still broken as of Kotlin 1.4.21.
    // https://kotlinlang.org/docs/reference/kapt.html#non-existent-type-correction
    correctErrorTypes = true
}
tasks.withType(JavaCompile) {
    options.encoding = 'UTF-8'
}
installDist {
    if (project.hasProperty('installPath')) {
        destinationDir = file(installPath)
    }
}
wrapper {
    distributionType = Wrapper.DistributionType.ALL
}
